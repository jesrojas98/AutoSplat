<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; width: 100vw; height: 100vh; font-family: system-ui, sans-serif; }
    canvas { display: block; width: 100%; height: 100%; }

    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      pointer-events: none; transition: opacity 0.5s;
    }
    #overlay.hidden { opacity: 0; }

    #progress-bar {
      width: 180px; height: 3px;
      background: rgba(255,255,255,0.12); border-radius: 99px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%; border-radius: 99px;
      background: linear-gradient(90deg, #6750A4, #9c77e8);
      transition: width 0.15s;
    }
    #status {
      color: rgba(255,255,255,0.45); font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    #hint {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.2); font-size: 10px;
      letter-spacing: 0.08em; text-transform: uppercase;
      white-space: nowrap; pointer-events: none; transition: opacity 1s;
    }
    #hint.hidden { opacity: 0; }
    #error-msg {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      color: rgba(255,100,100,0.7); font-size: 11px;
      letter-spacing: 0.06em; text-transform: uppercase; text-align: center;
      padding: 16px;
    }
    #error-msg.show { display: flex; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(103,80,164,0.7)" stroke-width="1.5">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="status">Cargando modelo 3D…</div>
  </div>

  <div id="hint">Arrastra · Scroll · Click derecho</div>
  <div id="error-msg"></div>

  <script>
    (function() {
    const params = new URLSearchParams(window.location.search);
    const modelUrl = params.get('url');
    const overlay = document.getElementById('overlay');
    const fill = document.getElementById('progress-fill');
    const status = document.getElementById('status');
    const hint = document.getElementById('hint');
    const errorMsg = document.getElementById('error-msg');
    const canvas = document.getElementById('canvas');

    function showError(msg) {
      overlay.classList.add('hidden');
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }

    if (!modelUrl) { showError('Sin URL de modelo'); return; }

    // Cargar gsplat como módulo dinámico
    async function main() {
      let mod;
      try {
        mod = await import('/gsplat.js');
      } catch(e) {
        showError('Error al cargar librería 3D: ' + e.message);
        return;
      }

      const { WebGLRenderer, Scene, Camera, OrbitControls, Loader } = mod;

      // Forzar dimensiones explícitas antes de crear el renderer
      // (el canvas dentro de un iframe puede tener clientWidth=0 al iniciar)
      canvas.width = window.innerWidth || 600;
      canvas.height = window.innerHeight || 360;

      const renderer = new WebGLRenderer(canvas);
      const camera = new Camera();
      const controls = new OrbitControls(camera, canvas);
      const scene = new Scene();

      function resize() {
        const w = window.innerWidth || canvas.clientWidth || 600;
        const h = window.innerHeight || canvas.clientHeight || 360;
        canvas.width = w;
        canvas.height = h;
        renderer.setSize(w, h);
      }
      window.addEventListener('resize', resize);

      // Descargar con fetch manual para ver progreso y errores
      status.textContent = 'Descargando…';
      let arrayBuffer;
      try {
        const resp = await fetch(modelUrl, { mode: 'cors', credentials: 'omit' });
        if (!resp.ok) { showError(`HTTP ${resp.status} — no se pudo descargar el modelo`); return; }

        const total = parseInt(resp.headers.get('content-length') || '0');
        const reader = resp.body.getReader();
        const chunks = [];
        let received = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;
          if (total > 0) {
            const pct = Math.round(received / total * 100);
            fill.style.width = pct + '%';
            status.textContent = `Cargando… ${pct}%`;
          }
        }

        // Unir chunks
        const full = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) { full.set(chunk, offset); offset += chunk.length; }
        arrayBuffer = full.buffer;
        fill.style.width = '100%';
        status.textContent = 'Inicializando visor…';

      } catch(e) {
        showError('Error de red: ' + e.message);
        return;
      }

      // Parsear el .splat y añadir a la escena
      try {
        Loader.LoadFromArrayBuffer(arrayBuffer, scene);
      } catch(e) {
        showError('Error al parsear el modelo: ' + e.message);
        return;
      }

      // Iniciar render — el worker WASM de sort puede tardar unos frames en estar listo
      overlay.classList.add('hidden');
      setTimeout(() => hint.classList.add('hidden'), 4000);

      let ready = false;
      function loop() {
        requestAnimationFrame(loop);
        controls.update();
        try {
          renderer.render(scene, camera);
          ready = true;
        } catch(e) {
          if (ready) { showError('Error de render: ' + e.message); }
          // ignorar errores de inicialización del worker WASM
        }
      }
      loop();
    }

    main().catch(e => showError(e.message || String(e)));
    })();
  </script>
</body>
</html>
